<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variant Animation Test</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0d1020;
        color: #fff;
        font-family: system-ui, sans-serif;
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hint {
        position: fixed;
        left: 16px;
        bottom: 16px;
        font-size: 14px;
        color: #aab6ea;
        background: rgba(10, 14, 28, 0.7);
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hint">
      Left/Right: change animation<br />
      Space: replay current<br />
      L: toggle loop
    </div>
    <script type="module" src="/src/animation-test.js"></script>
  </body>
</html>
